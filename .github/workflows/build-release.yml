name: Build & Release APK

on:
  push:
    tags:
      - 'v*'           # Trigger on version tags like v1.0.0
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 🛎 Checkout code
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗 Build APK with EAS
        run: eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: ⏳ Wait for build and download APK
        run: |
          echo "Waiting for EAS build to complete..."
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "Build URL: $BUILD_URL"
          curl -L -o img-to-pdf.apk "$BUILD_URL"
          ls -lh img-to-pdf.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: img-to-pdf-apk
          path: img-to-pdf.apk
          retention-days: 30

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "IMG_to_PDF ${{ github.ref_name }}"
          body: |
            ## 📄 IMG_to_PDF ${{ github.ref_name }}

            ### What's New
            - Convert multiple images to PDF on-device
            - Supports PNG, JPG, JPEG, BMP, WEBP, GIF, TIFF, HEIC, SVG, ICO
            - Drag to reorder pages
            - Page size, orientation, margin & quality controls
            - 100% offline — no uploads to any server

            ### Installation
            1. Download `img-to-pdf.apk` below
            2. Enable **Install from Unknown Sources** on your Android device
            3. Open the APK to install

            > Built with Expo + React Native | MIT License
          files: img-to-pdf.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
